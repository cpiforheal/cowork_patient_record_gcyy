name: hosbase

services:
  mysql:
    image: mysql:8.4
    container_name: hosbase-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    container_name: hosbase-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: mysql
      SERVER_PORT: 8080
      MYSQL_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      MYSQL_USERNAME: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      CLINIC_ATTACHMENT_DIR: /data/attachments
      CLINIC_FRONTEND_DIR: /app/frontend
    ports:
      - "${APP_PORT:-18080}:8080"
    volumes:
      - attachments:/data/attachments
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  admin-init:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      MYSQL_PWD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    volumes:
      - ./docker/admin.sql:/admin.sql:ro
    command: ["sh", "-c", "mysql -h mysql -u \"$${MYSQL_USER}\" \"$${MYSQL_DATABASE}\" < /admin.sql"]
    restart: "no"

volumes:
  mysql-data:
  attachments:
