name: Production gate

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coshare_patientrecord_sys_frontend/Geeker-Admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: coshare_patientrecord_sys_frontend/Geeker-Admin/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm type:check
      - run: pnpm lint:eslint:check
      - run: pnpm lint:prettier:check
      - run: pnpm build-only:pro
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coshare_patientrecord_sys_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Verify Docker for Testcontainers
        run: docker info
      - name: Run all backend tests (integration tests may not skip)
        run: ./mvnw --batch-mode clean test
