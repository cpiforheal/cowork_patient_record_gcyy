# Production intentionally has no credential defaults. Use a DDL-only migration account
# and a separate low-privilege runtime account.
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_RUNTIME_USERNAME}
spring.datasource.password=${MYSQL_RUNTIME_PASSWORD}
spring.flyway.url=${MYSQL_MIGRATION_URL:${MYSQL_URL}}
spring.flyway.user=${MYSQL_MIGRATION_USERNAME}
spring.flyway.password=${MYSQL_MIGRATION_PASSWORD}
