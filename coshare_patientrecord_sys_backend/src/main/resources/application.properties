spring.application.name=coshare_patientrecord_sys
spring.profiles.active=${SPRING_PROFILES_ACTIVE:mysql}
clinic.attachment-dir=${CLINIC_ATTACHMENT_DIR:runtime/clinic-attachments}
clinic.attachment.max-size-bytes=${CLINIC_ATTACHMENT_MAX_SIZE_BYTES:52428800}
clinic.attachment.allowed-mime-types=${CLINIC_ATTACHMENT_ALLOWED_MIME_TYPES:image/jpeg,image/png,image/webp,image/bmp,image/gif,application/pdf}
clinic.frontend-dir=${CLINIC_FRONTEND_DIR:}
clinic.backup.mysqldump-path=${CLINIC_BACKUP_MYSQLDUMP_PATH:}
clinic.backup.cron=${CLINIC_BACKUP_CRON:0 0 2 * * *}
clinic.backup.zone=${CLINIC_BACKUP_ZONE:Asia/Shanghai}
clinic.mysql-data-dir=${CLINIC_MYSQL_DATA_DIR:}
server.tomcat.max-http-form-post-size=${MAX_HTTP_FORM_POST_SIZE:100MB}
server.tomcat.max-swallow-size=${MAX_SWALLOW_SIZE:100MB}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}
clinic.ai.base-url=${AI_BASE_URL:}
clinic.ai.api-key=${AI_API_KEY:}
clinic.ai.model=${AI_MODEL:gpt-5.5}
clinic.ai.doubao.base-url=${CLINIC_AI_DOUBAO_BASE_URL:${DOUBAO_AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}}
clinic.ai.doubao.api-key=${CLINIC_AI_DOUBAO_API_KEY:${DOUBAO_AI_API_KEY:}}
clinic.ai.doubao.model=${CLINIC_AI_DOUBAO_MODEL:${DOUBAO_AI_MODEL:doubao-seed-2.0-mini}}
clinic.ai.doubao.tts.base-url=${CLINIC_AI_DOUBAO_TTS_BASE_URL:https://openspeech.bytedance.com/api/v3/tts/unidirectional/sse}
clinic.ai.doubao.tts.api-key=${CLINIC_AI_DOUBAO_TTS_API_KEY:}
clinic.ai.doubao.tts.model=${CLINIC_AI_DOUBAO_TTS_MODEL:seed-tts-2.0-standard}
clinic.ai.doubao.tts.resource-id=${CLINIC_AI_DOUBAO_TTS_RESOURCE_ID:seed-tts-2.0}
clinic.ai.doubao.tts.voice-type=${CLINIC_AI_DOUBAO_TTS_VOICE_TYPE:zh_male_tiancaitongsheng_mars_bigtts}
clinic.ai.doubao.tts.speed-ratio=${CLINIC_AI_DOUBAO_TTS_SPEED_RATIO:1.0}
clinic.ai.config-secret=${AI_CONFIG_SECRET:}
