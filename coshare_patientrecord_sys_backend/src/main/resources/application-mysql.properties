server.port=${SERVER_PORT:8080}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/hos_refactor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&sslMode=PREFERRED}
spring.datasource.username=${MYSQL_USERNAME:clinic_app}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=hos-clinic-mysql-pool
spring.datasource.hikari.maximum-pool-size=${MYSQL_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${MYSQL_POOL_MIN_IDLE:2}
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.user=${MYSQL_MIGRATION_USERNAME:${MYSQL_USERNAME:clinic_app}}
spring.flyway.password=${MYSQL_MIGRATION_PASSWORD:${MYSQL_PASSWORD}}

logging.file.name=${PRE_AI_LOG_FILE:${clinic.attachment-dir}/../logs/pre-ai-preview.log}
logging.logback.rollingpolicy.max-history=14
