server.port=${SERVER_PORT:8080}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/hos_unitywork?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=hos-clinic-mysql-pool
spring.datasource.hikari.maximum-pool-size=${MYSQL_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${MYSQL_POOL_MIN_IDLE:2}
spring.sql.init.mode=never
